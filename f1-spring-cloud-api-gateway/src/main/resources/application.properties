spring.application.name=f1-spring-cloud-api-gateway

server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8010/eureka

#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=f1-drivers-users-home
spring.cloud.gateway.server.webflux.routes[0].uri=lb://f1-drivers
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/f1-drivers/homepage
spring.cloud.gateway.server.webflux.routes[0].predicates[1]=Method=GET
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.server.webflux.routes[0].filters[1]=RewritePath=/f1-drivers/homepage, /users/home

spring.cloud.gateway.server.webflux.routes[1].id=f1-drivers-create
spring.cloud.gateway.server.webflux.routes[1].uri=lb://f1-drivers
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/f1-drivers/create
spring.cloud.gateway.server.webflux.routes[1].predicates[1]=Method=POST
spring.cloud.gateway.server.webflux.routes[1].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.server.webflux.routes[1].filters[1]=RewritePath=/f1-drivers/create, /users/drivers