spring.application.name=f1-spring-cloud-api-gateway

server.port=8082

eureka.client.service-url.defaultZone=http://localhost:8010/eureka

#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.routes[0].id=f1-drivers-users-home
spring.cloud.gateway.routes[0].uri=lb://f1-drivers
spring.cloud.gateway.routes[0].predicates[0]=Path=/f1-drivers/homepage
spring.cloud.gateway.routes[0].predicates[1]=Method=GET
spring.cloud.gateway.routes[0].predicates[2]=Header=Authorization, Bearer (.*)
spring.cloud.gateway.routes[0].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.routes[0].filters[1]=RewritePath=/f1-drivers/homepage, /users/home
spring.cloud.gateway.routes[0].filters[2]=AuthorizationHeaderFilter

spring.cloud.gateway.routes[1].id=f1-drivers-create
spring.cloud.gateway.routes[1].uri=lb://f1-drivers
spring.cloud.gateway.routes[1].predicates[0]=Path=/f1-drivers/create
spring.cloud.gateway.routes[1].predicates[1]=Method=POST
spring.cloud.gateway.routes[1].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.routes[1].filters[1]=RewritePath=/f1-drivers/create, /users/drivers

spring.cloud.gateway.routes[2].id=f1-drivers-h2-console
spring.cloud.gateway.routes[2].uri=lb://f1-drivers
spring.cloud.gateway.routes[2].predicates[0]=Path=/f1-drivers/h2
spring.cloud.gateway.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.routes[2].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.routes[2].filters[1]=RewritePath=/f1-drivers/h2, /h2-console

spring.cloud.gateway.routes[3].id=f1-drivers-login
spring.cloud.gateway.routes[3].uri=lb://f1-drivers
spring.cloud.gateway.routes[3].predicates[0]=Path=/f1-drivers/login
spring.cloud.gateway.routes[3].predicates[1]=Method=GET
spring.cloud.gateway.routes[3].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.routes[3].filters[1]=RewritePath=/f1-drivers/login, /users/login

spring.cloud.gateway.routes[4].id=f1-drivers-actuator
spring.cloud.gateway.routes[4].uri=lb://f1-drivers
spring.cloud.gateway.routes[4].predicates[0]=Path=/f1-drivers/actuator/**
spring.cloud.gateway.routes[4].predicates[1]=Method=GET
spring.cloud.gateway.routes[4].filters[0]=RemoveRequestHeader=Cookie
spring.cloud.gateway.routes[4].filters[1]=RewritePath=/f1-drivers/actuator/(?<segment>.*), /actuator/${segment}

spring.config.import=optional:configserver:http://localhost:8012

spring.cloud.config.username=${CONFIG_SERVER_USERNAME}
spring.cloud.config.password=${CONFIG_SERVER_PASSWORD}

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

management.endpoint.gateway.enabled=true
management.endpoints.web.exposure.include=gateway,health,mappings
